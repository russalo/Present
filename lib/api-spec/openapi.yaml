openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RPG World Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: world
    description: World state operations
  - name: session
    description: Game session operations
  - name: characters
    description: Character management
  - name: locations
    description: Location management
  - name: factions
    description: Faction management
  - name: items
    description: Item management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /world:
    get:
      operationId: getWorldState
      tags: [world]
      summary: Get world state
      description: Returns the current world state summary
      responses:
        "200":
          description: World state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldState"

  /session:
    get:
      operationId: getSessionLog
      tags: [session]
      summary: Get session log
      description: Returns the current session log with all turns
      responses:
        "200":
          description: Session log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
    post:
      operationId: processTurn
      tags: [session]
      summary: Process a player turn
      description: Submits a player action and returns the DM narrative with world updates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerTurn"
      responses:
        "200":
          description: Turn result with narrative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurnResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /session/new:
    post:
      operationId: startNewSession
      tags: [session]
      summary: Start a new session
      description: Starts a fresh game session optionally with a world seed
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewSessionRequest"
      responses:
        "200":
          description: New session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List all characters
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"

  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all locations
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"

  /factions:
    get:
      operationId: listFactions
      tags: [factions]
      summary: List all factions
      responses:
        "200":
          description: List of factions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faction"

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all items
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    WorldState:
      type: object
      properties:
        worldName:
          type: string
        currentEra:
          type: string
        currentLocation:
          type: string
        weather:
          type: string
        timeOfDay:
          type: string
        tension:
          type: integer
          minimum: 0
          maximum: 10
        characterCount:
          type: integer
        locationCount:
          type: integer
        factionCount:
          type: integer
        itemCount:
          type: integer
        turnCount:
          type: integer
        lastUpdated:
          type: string
      required:
        - worldName
        - currentEra
        - currentLocation
        - weather
        - timeOfDay
        - tension
        - characterCount
        - locationCount
        - factionCount
        - itemCount
        - turnCount
        - lastUpdated

    SessionLog:
      type: object
      properties:
        sessionId:
          type: string
        turns:
          type: array
          items:
            $ref: "#/components/schemas/Turn"
        startedAt:
          type: string
        worldName:
          type: string
      required:
        - sessionId
        - turns
        - startedAt
        - worldName

    Turn:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        turnNumber:
          type: integer
        playerAction:
          type: string
        narrative:
          type: string
        worldUpdates:
          type: object
          additionalProperties: true
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - turnNumber
        - playerAction
        - narrative
        - createdAt

    PlayerTurn:
      type: object
      properties:
        action:
          type: string
          description: The player's action or dialogue
        sessionId:
          type: string
          description: The session ID to continue
      required:
        - action
        - sessionId

    TurnResult:
      type: object
      properties:
        turn:
          $ref: "#/components/schemas/Turn"
        worldUpdates:
          type: object
          additionalProperties: true
        updatedEntities:
          type: array
          items:
            type: string
      required:
        - turn
        - updatedEntities

    NewSessionRequest:
      type: object
      properties:
        worldName:
          type: string
        playerCharacterName:
          type: string
        playerCharacterClass:
          type: string
        worldSeed:
          type: string
          description: Optional seed description for the world

    Character:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [player, npc, enemy, ally]
        class:
          type: string
        race:
          type: string
        level:
          type: integer
        health:
          type: integer
        maxHealth:
          type: integer
        currentLocation:
          type: string
        description:
          type: string
        traits:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [alive, dead, unknown, missing]
        updatedAt:
          type: string
      required:
        - id
        - name
        - role
        - status
        - updatedAt

    Location:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        description:
          type: string
        region:
          type: string
        discovered:
          type: boolean
        danger:
          type: integer
          minimum: 0
          maximum: 10
        notableFeatures:
          type: array
          items:
            type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - type
        - description
        - discovered
        - updatedAt

    Faction:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        alignment:
          type: string
        power:
          type: integer
          minimum: 0
          maximum: 10
        playerRelation:
          type: integer
          minimum: -10
          maximum: 10
        goals:
          type: array
          items:
            type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - description
        - updatedAt

    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [weapon, armor, potion, artifact, misc, key]
        description:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, legendary, artifact]
        ownedBy:
          type: string
        location:
          type: string
        magical:
          type: boolean
        updatedAt:
          type: string
      required:
        - id
        - name
        - type
        - description
        - rarity
        - magical
        - updatedAt
