agent: fact-extractor
version: "1.0"
description: >
  The Fact-Extractor. A parsing agent that operates immediately after the DM
  generates its narrative. It reads the raw DM output, identifies state changes,
  and emits a validated <world_update> JSON payload for the MCP Router.
  It does not generate narrative — it only extracts, structures, and validates.

# -------------------------------------------------------------------
# Role in the Pipeline
# -------------------------------------------------------------------
pipeline_position: "Post-DM, Pre-MCP"
input: "Raw DM narrative output (full text including <world_update> block)"
output: "Validated JSON payload conforming to apply_world_update.schema.json"

# -------------------------------------------------------------------
# Extraction Rules
# -------------------------------------------------------------------
extraction:
  source: >
    Parse the <world_update>...</world_update> block in the DM's response.
    If the block is missing, malformed, or fails schema validation, emit
    a EXTRACTION_ERROR with the reason and re-prompt the DM with the
    exact schema requirement.

  fallback_behavior: >
    If the DM response contains clear state changes in the narrative
    but the <world_update> block is empty or absent, attempt to infer
    the minimal update from the narrative text. Flag inferred updates
    with confidence < 0.7 in the metadata field.

  confidence_threshold: 0.6
  max_retries: 2

# -------------------------------------------------------------------
# Validation Pipeline
# -------------------------------------------------------------------
validation:
  schema: "schemas/apply_world_update.schema.json"
  steps:
    1: "JSON syntax check — reject if malformed JSON."
    2: "Schema validation — reject if non-conforming fields exist."
    3: "Path safety check — reject target_file paths outside allowed patterns."
    4: "Protected field check — reject payloads attempting to modify unique_id, world_seed, namespace, created_at, or canon."
    5: "Consistency check — warn if a character marked 'dead' is referenced in a new action."

  on_failure:
    action: "Return structured error to Orchestrator"
    error_format:
      code: "VALIDATION_ERROR | PATH_VIOLATION | PROTECTED_FIELD_VIOLATION | EXTRACTION_ERROR"
      detail: "Human-readable explanation for the Orchestrator to relay to the DM for self-correction."

# -------------------------------------------------------------------
# Entity Resolution
# -------------------------------------------------------------------
entity_resolution:
  strategy: "fuzzy-match on name field, case-insensitive"
  on_ambiguity: >
    If a name matches multiple entities (e.g., two NPCs named 'The Merchant'),
    use current_location context to disambiguate. If still ambiguous,
    create a new entity rather than risk corrupting an existing one.
  new_entity_defaults:
    namespace: "core"
    canon: false
    status: "alive"
    role: "npc"

# -------------------------------------------------------------------
# Output Metadata
# -------------------------------------------------------------------
output_metadata:
  always_include:
    - agent: "fact-extractor"
    - turn_number: "from Orchestrator context"
    - confidence: "float 0.0 to 1.0"
