agent: lorekeeper
version: "1.0"
description: >
  The Lorekeeper. A context-assembly agent that runs before the DM on every turn.
  It queries ChromaDB for semantically relevant lore and PostgreSQL for live
  entity state, then assembles a ranked context package for the DM's prompt.
  It does not generate narrative — it only retrieves, ranks, and injects.

# -------------------------------------------------------------------
# Role in the Pipeline
# -------------------------------------------------------------------
pipeline_position: "Pre-DM, Post-Player-Input"
input: "Player action text + current world state snapshot"
output: "Ranked context block injected into DM system prompt"

# -------------------------------------------------------------------
# Query Strategy
# -------------------------------------------------------------------
query:
  vector_db: "ChromaDB via db-vector MCP server (port 8001)"
  relational_db: "PostgreSQL via db-vector MCP server (port 8001)"

  semantic_search:
    top_k: 8
    namespace_filter: "Query Core and Community separately. Merge results with Core priority."
    embedding_fields:
      - "Player action text"
      - "Current location name"
      - "Active NPC names"
      - "Last 2 turns narrative summary"

  structured_queries:
    - "SELECT * FROM characters WHERE current_location = :current_location AND status = 'alive'"
    - "SELECT * FROM locations WHERE name = :current_location"
    - "SELECT * FROM factions ORDER BY ABS(player_relation) DESC LIMIT 5"
    - "SELECT * FROM items WHERE owned_by = :player_name OR location = :current_location"

# -------------------------------------------------------------------
# Context Ranking
# -------------------------------------------------------------------
ranking:
  algorithm: "priority-weighted merge"
  tiers:
    1:
      source: "PostgreSQL live state"
      description: "Current entity positions, health, status — always included."
      token_budget: 800
    2:
      source: "ChromaDB — Core namespace (priority 10)"
      description: "Canonical lore — immutable world facts."
      token_budget: 600
    3:
      source: "Recent turns (last 5)"
      description: "Immediate narrative continuity."
      token_budget: 500
    4:
      source: "ChromaDB — Community namespace (priority 1-9)"
      description: "Supplementary lore — presented as rumors if contradicting Core."
      token_budget: 300
    5:
      source: "Simulation state"
      description: "Background world events (faction movements, weather changes)."
      token_budget: 200

  total_context_budget_tokens: 2400
  overflow_strategy: "truncate lowest-priority tiers first"

# -------------------------------------------------------------------
# Core vs. Community Conflict Resolution
# -------------------------------------------------------------------
conflict_resolution:
  rule: "Core Always Wins"
  instruction_to_dm: >
    If retrieved Community lore contradicts an established Core fact,
    treat the Core lore as ground truth. You may present the Community
    version as an in-world rumor, folk legend, or unreliable testimony —
    but never as canonical fact.

# -------------------------------------------------------------------
# Output Format
# -------------------------------------------------------------------
output:
  format: "Structured context block in DM system prompt"
  sections:
    - "WORLD STATE: location, time, weather, tension"
    - "PRESENT CHARACTERS: name, role, status, traits"
    - "LOCATION DETAILS: description, danger, notable features"
    - "ACTIVE FACTIONS: name, player relation, current goals"
    - "INVENTORY/NEARBY ITEMS: name, type, owner"
    - "RECENT HISTORY: last 5 turns summary"
    - "LORE CONTEXT: ranked semantic search results"
    - "WORLD EVENTS: simulation background events"
