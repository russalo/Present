kind = "web"
previewPath = "/"
title = "RPG World Engine"
version = "1.0.0"
id = "artifacts/rpg-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18331

[services.development]
run = "pnpm --filter @workspace/rpg-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rpg-engine", "run", "build" ]
publicDir = "artifacts/rpg-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18331"
BASE_PATH = "/"
